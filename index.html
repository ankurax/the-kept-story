<div id="password-screen">
    <div class="password-container">

        <h1>THE KEPT STORY</h1>

        <p>
            This story is meant for someone special.
        </p>

        <input
            type="password"
            id="password-input"
            placeholder="Enter Password"
        >

        <button onclick="checkPassword()">
            Enter
        </button>

        <p id="error-message"></p>

    </div>
</div>

<div id="main-content">

    <section id="cover">

        <div class="cover-content">

            <p class="small-text">
                To the girl
            </p>

            <h1>
                who unknowingly changed
                the direction of my life.
            </h1>

            <p class="birthday">
                Happy Birthday, Manisha.
            </p>

            <p class="gift-line">
                I made something for us.
            </p>

            <button id="openBtn">
                Open
            </button>

        </div>

    </section>

</div>

<script src="script.js"></script>
</body>
</html>
